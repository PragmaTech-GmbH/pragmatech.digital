{{ define "main" }}
<!-- Main Content -->
<section class="py-16 bg-white">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <header class="max-w-5xl mx-auto mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-3">{{ .Title }}</h1>
            {{ with .Description }}
            <p class="text-lg text-slate-600">{{ . }}</p>
            {{ end }}
        </header>
        <div class="prose prose-slate prose-lg max-w-5xl mx-auto page-content text-slate-700">
            {{ .Content }}
        </div>
    </div>
</section>

<!-- Last Updated Info -->
{{ if .Params.last_updated }}
<section class="py-8 bg-slate-50 border-t border-slate-200">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="max-w-3xl mx-auto text-center">
            <p class="text-sm text-slate-500">
                Last updated: {{ .Params.last_updated }}
            </p>
        </div>
    </div>
</section>
{{ end }}

{{ end }}
