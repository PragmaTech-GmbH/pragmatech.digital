<!-- Testimonials Section -->
<section class="py-24 bg-slate-800/30 border-y border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <h2 class="text-3xl font-bold text-white mb-4">Client Results</h2>
            <p class="text-xl text-slate-400">
                Engineering leaders trust PragmaTech to transform their delivery capability.
            </p>
        </div>

        <!-- Testimonial cards -->
        <div class="grid md:grid-cols-2 gap-12 max-w-5xl mx-auto">
            {{ range index $.Site.Data.testimonials "consulting-comments" }}
            {{ partial "testimonial-card.html" (dict "testimonial" . "style" "premium" "showStars" false "showLogo" true) }}
            {{ end }}
        </div>
    </div>
</section>
