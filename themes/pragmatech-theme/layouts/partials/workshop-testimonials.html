<!-- Workshop Testimonials Section -->
<section class="py-20 bg-slate-800/50">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <h2 class="text-3xl md:text-4xl font-bold mb-4 text-white">What Workshop Participants Say</h2>
            <p class="text-xl text-slate-400 max-w-2xl mx-auto">
                Hear from developers who have attended our hands-on testing workshops.
            </p>
        </div>

        <div class="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">
            {{ range first 3 (index $.Site.Data.testimonials "workshop-comments") }}
            {{ partial "testimonial-card.html" (dict "testimonial" . "style" "default" "showStars" true) }}
            {{ end }}
        </div>
    </div>
</section>
