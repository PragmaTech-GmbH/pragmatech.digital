{{/*
    Floating variant toggle. Sits below the sticky header, top-right.
    Visible to every visitor on the homepage. Persists choice in localStorage.
*/}}
<div id="variant-toggle"
     class="fixed top-20 right-3 sm:right-5 z-40
            bg-slate-900/90 backdrop-blur-md border border-slate-700
            rounded-full shadow-2xl shadow-slate-950/40
            px-2 py-1.5 sm:px-3 sm:py-2
            flex items-center gap-1 sm:gap-2"
     aria-label="Homepage layout variant selector">
    <span class="hidden sm:inline text-[10px] uppercase tracking-widest text-slate-400 font-semibold pl-2">Layout</span>
    <div class="flex items-center gap-1" role="tablist">
        <button type="button"
                data-variant-target="a"
                role="tab"
                aria-pressed="true"
                aria-label="Variant A — Performance Dashboard"
                class="variant-toggle-btn w-7 h-7 sm:w-8 sm:h-8 rounded-full text-xs font-bold
                       text-slate-300 hover:text-white hover:bg-slate-800
                       focus:outline-none focus:ring-2 focus:ring-brand-400
                       transition-colors">A</button>
        <button type="button"
                data-variant-target="b"
                role="tab"
                aria-pressed="false"
                aria-label="Variant B — Editorial Authority"
                class="variant-toggle-btn w-7 h-7 sm:w-8 sm:h-8 rounded-full text-xs font-bold
                       text-slate-300 hover:text-white hover:bg-slate-800
                       focus:outline-none focus:ring-2 focus:ring-brand-400
                       transition-colors">B</button>
        <button type="button"
                data-variant-target="c"
                role="tab"
                aria-pressed="false"
                aria-label="Variant C — Developer Terminal"
                class="variant-toggle-btn w-7 h-7 sm:w-8 sm:h-8 rounded-full text-xs font-bold
                       text-slate-300 hover:text-white hover:bg-slate-800
                       focus:outline-none focus:ring-2 focus:ring-brand-400
                       transition-colors">C</button>
    </div>

    <!-- Theme toggle (Variant A only — visible when A is active) -->
    <div id="variant-a-theme-toggle" class="hidden items-center gap-1 pl-2 ml-1 border-l border-slate-700">
        <button type="button"
                data-theme-target="dark"
                aria-pressed="true"
                aria-label="Variant A — Dark Theme"
                title="Dark theme"
                class="theme-toggle-btn w-7 h-7 sm:w-8 sm:h-8 rounded-full
                       text-slate-300 hover:text-white hover:bg-slate-800
                       focus:outline-none focus:ring-2 focus:ring-brand-400
                       flex items-center justify-center transition-colors">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
            </svg>
        </button>
        <button type="button"
                data-theme-target="light"
                aria-pressed="false"
                aria-label="Variant A — Light Theme"
                title="Light theme"
                class="theme-toggle-btn w-7 h-7 sm:w-8 sm:h-8 rounded-full
                       text-slate-300 hover:text-white hover:bg-slate-800
                       focus:outline-none focus:ring-2 focus:ring-brand-400
                       flex items-center justify-center transition-colors">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
            </svg>
        </button>
    </div>
</div>
