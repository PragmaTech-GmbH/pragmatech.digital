painSection:
  headline: "Does this sound like your current engineering reality?"
  subheadline: "Six symptoms tech leads tell us about every single week."

painPoints:
  - category: "Productivity Killer"
    title: "Painfully Slow Builds"
    description: "Endless test runs constantly pull developers out of their flow, destroying motivation and causing expensive context switches."
    icon: "clock"
  - category: "The AI Time Bomb"
    title: "Flying Blind with AI Code"
    description: "AI tools pump out code in record time, but without fast, automated checks, this turns into a ticking time bomb for production bugs."
    icon: "bomb"
  - category: "False Security"
    title: "The Flaky Test Frustration"
    description: "Unreliable integration tests drive teams crazy with avoidable retry-loops, giving a false sense of security and wasting valuable time."
    icon: "alert"
  - category: "Exhausted Auditors"
    title: "Review Bottlenecks"
    description: "Developers are shifting from proud creators to exhausted code-auditors, spending hours untangling \"almost right\" AI code."
    icon: "user"
  - category: "Sinking Metrics"
    title: "Dropping DORA Metrics"
    description: "Instead of shipping features fast, teams are stepping on the brakes because they fear the next deployment."
    icon: "trend-down"
  - category: "Craftsmanship Decay"
    title: "Maintenance Hell"
    description: "Code gets blindly approved because the test suite is too slow to provide immediate, reliable feedback."
    icon: "wrench"

