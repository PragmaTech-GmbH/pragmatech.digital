faqSection:
  headline: "Questions before booking?"
  faqs:
    - question: "What if my codebase is too messy or my pipeline is unique?"
      answer: "That's exactly the case where the 50% gain is most achievable. The TÜV-Report in step 1 is built for unique setups — we map your reality before touching anything. If we can't beat 30%, you don't pay."
    - question: "How much developer time do we have to commit?"
      answer: "About 2 hours per week from a tech lead and ~1 hour per week per dev during the rollout. The first two weeks are mostly me working in the code; team enablement happens in weeks 3 and 4."
    - question: "We already use Testcontainers / Spring Context Caching. Will this still help?"
      answer: "Yes — most teams who 'already use them' are leaving 40–70% on the table due to misconfiguration. The audit will show you exactly where the gap is, with measurements."
    - question: "What does the 30-day guarantee actually cover?"
      answer: "If at the end of week 4 your CI build time has not dropped by at least 30% versus the documented baseline, you get a full refund. No clauses, no fine print."

