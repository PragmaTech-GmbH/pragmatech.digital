methodology:
  headline: "Our Blueprint for 50% Faster Builds"
  subheadline: "Five steps. No heavy jargon. Real results black-on-white."
  steps:
    - title: "The Unvarnished Report"
      description: "A ruthless baseline analysis of your project, pipeline, and ways of working to identify hidden productivity killers."
    - title: "The Build-Time Turbo"
      description: "Picking low-hanging fruits directly in the code (Spring Context Caching, parallelization, Testcontainers optimization) for instant flow."
    - title: "Pipeline Sanitation"
      description: "Eliminating flaky tests, removing duplicate steps, and adding smart caching to build a rock-solid safety net."
    - title: "The Strategy Rollout"
      description: "Handing over a foolproof standard workflow and showing your team the massive time savings black-on-white."
    - title: "Ultimate Team Enablement"
      description: "Hands-on mentoring directly in the code to turn your developers into self-sufficient testing experts."
  cta:
    headline: "Want this blueprint applied to your pipeline?"
    button: "Start with Step 1 - The Unvarnished Report"
    note: "30-minute call. We open with step 1 - no commitment, no pitch."

offer:
  headline: "How working together looks."
  subheadline: "Three things you can count on from day one."
  pillars:
    - tag: "Skin in the game"
      title: "The Guarantee"
      description: "Once we have the unvarnished baseline report, we agree on a target together - usually a 50% cut in build time. If we don't meet it, you pay nothing."
    - tag: "A handful at a time"
      title: "The Exclusivity"
      description: "We deliberately keep the client list short and work with only a handful of teams in parallel. Expect blazing-fast feedback, direct access, and zero queues."
    - tag: "The Bonus"
      title: "The Autopilot Upgrade"
      description: "You get a custom MCP-Server (or Skill) to make testing knowledge instantly accessible, plus optional monthly check-ins to ensure your DORA metrics never slip."

testimonialsSection:
  headline: "Real Teams. Real Numbers."
  subheadline: "Two recent customer stories - Challenge, Solution, Result."

faqSection:
  headline: "Questions before booking?"
  faqs:
    - question: "How do I prepare for the meeting?"
      answer: "A short overview of your project is enough: age, team size, and the biggest challenges you're facing today. We'll discuss the rest together on the call."
    - question: "Will this work for Kotlin too?"
      answer: "Yes - the approach works for all JVM languages, including Kotlin, Groovy, and Scala."
    - question: "What does the 30-day discovery cover and how does it work?"
      answer: "If we identify we can help, we start with a detailed report of your current situation. Based on that, we agree on a target number (usually a 50% improvement). If we don't reach it, you pay nothing."
    - question: "Which Spring Boot versions do you support?"
      answer: "Everything starting from Spring Boot 2.x onwards, including Spring Boot 3 and the latest Spring Boot 4 releases."
    - question: "Which Java versions do you support?"
      answer: "All of them - from Java 8 to the latest release."

finalCTA:
  headline: "Let's Analyze Your Situation"
  subheadline: "No sales pitch. A 15-minute walkthrough of where your pipeline currently stands."
  steps:
    - title: "Pick a slot"
      description: "Click the button and grab a 15-minute slot in my calendar."
    - title: "Briefly diagnose"
      description: "We'll discuss where your pipeline stands today and the challenges you're hitting."
    - title: "See the optimization"
      description: "I'll show you exactly how an optimization would look for your specific setup - completely independent of whether we end up working together."
  buttonText: "Let's Analyze Your Setup"
  reassurance: "15 minutes. Zero pitch. You leave with at least one concrete optimization you can ship next week."
